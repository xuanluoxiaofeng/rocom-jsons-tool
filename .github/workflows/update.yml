name: 自动更新图鉴数据

on:
  schedule:
    - cron: '3,6,9 8,12,16,20 * * *'

  workflow_dispatch:     # 允许手动触发

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
      
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # --- 核心修改部分开始 ---
      - name: Scrape, check, and retry if needed
        run: |
          # 配置 Git 用户信息，为后续的提交做准备
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # 设置最大重试次数，防止无限循环
          MAX_RETRIES=10
          # 设置每次重试之间的等待时间（秒）
          RETRY_DELAY=60

          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "=== 开始第 $i 次数据抓取尝试 ==="
            
            # 1. 运行抓取脚本
            python api.py

            # 2. 添加文件到暂存区，以便检查差异
            git add fruits.json pokemon.json live.json raw.json

            # 3. 专门检查 live.json 和 raw.json 是否有变化
            # git diff --quiet 命令在没有差异时返回 0，有差异时返回 1
            # 因此，如果命令返回非0（即有变化），我们就跳出循环
            if ! git diff --cached --quiet live.json raw.json; then
              echo "✅ 检测到 live.json 或 raw.json 有更新，停止重试。"
              break
            else
              echo "⚠️ live.json 和 raw.json 没有变化。"
              
              # 如果是最后一次尝试，则报错并退出工作流
              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ 已达到最大重试次数 ($MAX_RETRIES)，但数据仍未更新。工作流将失败。"
                exit 1
              fi
              
              echo "⏳ 等待 $RETRY_DELAY 秒后进行下一次尝试..."
              sleep $RETRY_DELAY
              # 清理暂存区，为下一次尝试做准备
              git reset
            fi
          done

          # --- 循环结束后，检查是否有任意文件需要提交 ---
          if git diff --staged --quiet; then
            echo "没有检测到任何数据更新，无需提交。"
          else
            git commit -m "chore: 自动更新数据 [skip ci]"
            git push origin HEAD:main
          fi
      # --- 核心修改部分结束 ---
